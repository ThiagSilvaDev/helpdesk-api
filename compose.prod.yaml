name: helpdesk-prod

services:
  api:
    extends:
      file: compose.yaml
      service: api
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    extends:
      file: compose.yaml
      service: postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
    ports:
      - "5432:5432"
    volumes:
      - prod-pgdata:/var/lib/postgresql/data

volumes:
  prod-pgdata:
