# Local LGTM observability profile. Use together with dev:
# SPRING_PROFILES_ACTIVE=dev,observability

# Actuator / metrics
management.endpoints.web.exposure.include=health,info,metrics,prometheus,loggers
management.endpoint.health.show-details=when_authorized
app.observability.prometheus-public=true
management.otlp.metrics.export.enabled=false

# OpenTelemetry traces
management.tracing.sampling.probability=1.0
management.tracing.export.otlp.enabled=true
management.opentelemetry.tracing.export.otlp.endpoint=${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://alloy:4318/v1/traces}
management.opentelemetry.tracing.export.otlp.transport=http
management.opentelemetry.resource-attributes.service.name=${OTEL_SERVICE_NAME:helpdesk-api}
management.opentelemetry.resource-attributes.service.namespace=helpdesk
management.opentelemetry.resource-attributes.deployment.environment=local

# Container log collectors work best with structured stdout.
logging.structured.format.console=ecs
logging.structured.ecs.service.environment=local
logging.structured.json.stacktrace.include-hashes=true
