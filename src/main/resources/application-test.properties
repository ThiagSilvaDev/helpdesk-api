# H2 Database configuration for testing
spring.datasource.url=jdbc:h2:mem:helpdesk_testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=create-drop

# Flyway disabled — test uses H2 with create-drop
spring.flyway.enabled=false

# JWT
security.jwt.secret=test-secret-test-secret-test-secret-12345
security.jwt.expiration-ms=3600000
security.jwt.issuer=helpdesk-api
