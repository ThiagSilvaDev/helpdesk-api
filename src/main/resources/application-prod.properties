# Datasource
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Security / JWT (required secret)
security.jwt.secret=${JWT_SECRET}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}

# Actuator
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.info.env.enabled=false

# Logging
logging.level.root=INFO
logging.level.org.springframework.security=WARN
logging.level.com.thiagsilvadev.helpdesk=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{requestId:-}] [%thread] %logger{36} - %msg%n

# Swagger
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Disable Docker Compose integration outside local development
spring.docker.compose.enabled=false

app.setup.admin.name=${ADMIN_NAME}
app.setup.admin.email=${ADMIN_EMAIL}
app.setup.admin.password=${ADMIN_PASSWORD}