app.dev-admin.name=${DEV_ADMIN_NAME:Admin Dev}
app.dev-admin.email=${DEV_ADMIN_EMAIL:admin@helpdesk.local}
app.dev-admin.password=${DEV_ADMIN_PASSWORD:Admin@123456}
app.dev-user.name=${DEV_USER_NAME:Default User}
app.dev-user.email=${DEV_USER_EMAIL:user@helpdesk.local}
app.dev-user.password=${DEV_USER_PASSWORD:User@123456}
app.dev-tech.name=${DEV_TECH_NAME:Default Tech}
app.dev-tech.email=${DEV_TECH_EMAIL:tech@helpdesk.local}
app.dev-tech.password=${DEV_TECH_PASSWORD:Tech@123456}

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Flyway disabled — dev uses Hibernate create-drop
spring.flyway.enabled=false

# Docker compose layering support
spring.docker.compose.file=compose.yaml, compose.dev.yaml

# Security / JWT
security.jwt.secret=${JWT_SECRET:helpdesk-local-dev-secret-helpdesk-local-dev-secret-123456}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

spring.datasource.url=jdbc:postgresql://postgres:5432/mydatabase
spring.datasource.username=myuser
spring.datasource.password=secret

management.endpoints.web.exposure.include=health,info,metrics,loggers
management.endpoint.health.show-details=when_authorized

# Logging
logging.level.root=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN

# Application Logic & Security
logging.level.com.thiagsilvadev.helpdesk=DEBUG
logging.level.org.springframework.security=INFO

# SQL tracing
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Custom log pattern
logging.pattern.console=%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(%-5level) %clr([%X{requestId:-}]){magenta} %clr([%thread]){faint} %clr(%logger{36}){cyan} - %msg%n
