spring.application.name=helpdesk

# Default profile is 'dev' for local development convenience.
# In production, set SPRING_PROFILES_ACTIVE=prod via environment variable (overrides this default).
spring.profiles.default=dev

# Load local .env file when present
spring.config.import=optional:file:.env[.properties]
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Actuator
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,metrics
