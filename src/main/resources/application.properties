spring.application.name=helpdesk-api

# Load local .env file when present
spring.config.import=optional:file:.env[.properties]
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.data.redis.repositories.enabled=false

# Actuator
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,metrics

# Observability exporters are opt-in via the observability profile.
management.otlp.metrics.export.enabled=false
management.tracing.export.enabled=false
management.tracing.export.otlp.enabled=false

# Logging
logging.pattern.correlation=[requestId:%X{requestId:-},traceId:%X{traceId:-},spanId:%X{spanId:-}]
