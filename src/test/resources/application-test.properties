spring.jpa.hibernate.ddl-auto=validate

spring.flyway.clean-disabled=false

security.jwt.secret=test-secret-test-secret-test-secret-12345
security.jwt.expiration-ms=3600000
security.jwt.refresh-expiration-ms=604800000
security.jwt.issuer=helpdesk-api
security.jwt.audience=helpdesk-api

spring.data.redis.host=localhost
spring.data.redis.port=6379

app.security.bcrypt.strength=4

spring.docker.compose.skip.in-tests=true

spring.jpa.properties.hibernate.format_sql=true

spring.rabbitmq.listener.simple.auto-startup=false
spring.rabbitmq.listener.direct.auto-startup=false
app.notifications.rabbit.enabled=false
